<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>家电出入库系统 - OA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-size: .875rem;
        }
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            padding: 48px 0 0;
            box-shadow: inset -1px 0 0 rgba(0,0,0,.1);
            background-color: #343a40;
            width: 250px;
        }
        .sidebar .nav-link {
            font-weight: 500;
            color: #ddd;
        }
        .sidebar .nav-link.active {
            color: #fff;
            background-color: #007bff;
        }
        .sidebar .nav-link:hover {
            color: #fff;
            background-color: #495057;
        }
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }
        @media (max-width: 768px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                padding-top: 0;
            }
            .main-content {
                margin-left: 0;
            }
        }
        .navbar-brand {
            padding-top: .75rem;
            padding-bottom: .75rem;
            background-color: rgba(0,0,0,.25);
            box-shadow: inset -1px 0 0 rgba(0,0,0,.25);
        }
        .bi {
            margin-right: 5px;
        }
        .tr-low-stock {
            background-color: #fff3cd !important;
        }
    </style>
</head>
<body>
<header class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
    <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3" href="#">家电出入库系统</a>
    <button class="navbar-toggler position-absolute d-md-none collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="navbar-nav">
        <div class="nav-item text-nowrap">
            <a class="nav-link px-3" href="/logout">退出</a>
        </div>
    </div>
</header>

<div class="container-fluid">
    <div class="row">
        <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse">
            <div class="position-sticky pt-3">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" onclick="loadContent('inventory')">
                            <i class="bi bi-box"></i> 库存管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadContent('inbound')">
                            <i class="bi bi-arrow-down-circle"></i> 入库记录
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadContent('outbound')">
                            <i class="bi bi-arrow-up-circle"></i> 出库记录
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadContent('saleOutbound')">
                            <i class="bi bi-cart-plus"></i> 销售出库
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadContent('profit')">
                            <i class="bi bi-graph-up"></i> 利润统计
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadContent('productManage')">
                            <i class="bi bi-gear"></i> 商品管理
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
            <div id="mainContent">
                <!-- 默认加载库存管理内容 -->
                <div th:replace="fragments/inventory :: inventory"></div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function loadContent(page) {
        if (page === 'inventory') {
            $('#mainContent').load('/fragment/inventory');
        } else if (page === 'inbound') {
            $('#mainContent').load('/fragment/inbound');
        } else if (page === 'outbound') {
            $('#mainContent').load('/fragment/outbound');
        } else if (page === 'saleOutbound') {
            $('#mainContent').load('/fragment/saleOutbound');
        } else if (page === 'profit') {
            $('#mainContent').load('/fragment/profit');
        } else if (page === 'productManage') {
            $('#mainContent').load('/fragment/productManage');
        } else {
            // 默认加载库存管理
            $('#mainContent').load('/fragment/inventory');
        }
        // 高亮当前菜单
        $('.nav-link').removeClass('active');
        $(event.target).closest('.nav-link').addClass('active');
    }
</script>
</body>
</html>
