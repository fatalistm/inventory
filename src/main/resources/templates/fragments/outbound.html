<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>出库记录</title>
</head>
<body>
<div th:fragment="outbound">
    <h2>出库记录</h2>
    <div class="card">
        <div class="card-body">
            <table class="table table-bordered" id="outboundTable">
                <thead>
                <tr><th>出库单号</th><th>客户</th><th>出库日期</th><th>操作人</th><th>备注</th></tr>
                </thead>
                <tbody id="outboundTbody">
                <tr><td colspan="5" class="text-center">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        function loadOutboundRecords() {
            $.get("/api/outbound/list", function(orders) {
                let tbody = $("#outboundTbody");
                tbody.empty();
                if (orders.length === 0) {
                    tbody.append('<tr><td colspan="5" class="text-center">暂无数据</td></tr>');
                } else {
                    orders.forEach(order => {
                        let row = `<tr>
                            <td>${order.orderNo}</td>
                            <td>${order.customer || ''}</td>
                            <td>${order.outboundDate}</td>
                            <td>${order.operator || ''}</td>
                            <td>${order.remark || ''}</td>
                        </tr>`;
                        tbody.append(row);
                    });
                }
            }).fail(() => {
                $("#outboundTbody").html('<tr><td colspan="5" class="text-center text-danger">加载失败</td></tr>');
            });
        }
        $(document).ready(function() {
            loadOutboundRecords();
        });
    </script>
</div>
</body>
</html>
